<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiiJump - Customer Kiosk</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        nav { background-color: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #22c55e; }
        nav .logo { color: #22c55e; font-size: 1.6rem; font-weight: 800; text-decoration: none; }
        nav .logo span { color: #06b6d4; }
        nav a.back-link { color: #94a3b8; text-decoration: none; font-weight: 600; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        section { background: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; height: fit-content; }
        h2 { color: white; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 14px; color: #94a3b8; font-weight: 600; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 6px; font-size: 14px; margin-top: 5px; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; background: #22c55e; }
        table { width: 100%; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #1e293b; color: #06b6d4; }
        .status-active { color: #22c55e; font-weight: bold; }
        .status-timeout { color: #ef4444; font-weight: bold; animation: flash 1s infinite alternate; }
        .status-checkedout { color: #64748b; }
        .msg { color: #22c55e; font-weight: bold; margin-top: 10px; text-align: center; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Wii<span>Jump</span> — Kiosk</a>
        <a href="index.html" class="back-link">← Main Menu</a>
    </nav>
    <div class="container">
        <section>
            <h2>Guest Registration</h2>
            <form id="regForm">
                <label>First Name<input type="text" id="firstName" placeholder="Enter your name" required></label>
                <label>Phone Number<input type="tel" id="phone" pattern="09[0-9]{9}" placeholder="09XXXXXXXXX" required></label>
                <label>Select Pass Package
                    <select id="packageMinutes">
                        <option value="60">1 Hour Access Pass</option>
                        <option value="120">2 Hour Access Pass</option>
                        <option value="9999">Unlimited Session Pass</option>
                    </select>
                </label>
                <button type="submit" class="btn">Check In & Play</button>
            </form>
            <div id="regMsg" class="msg"></div>
        </section>

        <section>
            <h2>Live Session Monitor</h2>
            <table>
                <thead>
                    <tr><th>Name</th><th>Package</th><th>Time Remaining</th><th>Status</th></tr>
                </thead>
                <tbody id="sessionsTable"></tbody>
            </table>
        </section>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const sessions = JSON.parse(localStorage.getItem('wii_sessions')) || [];
            
            const newSession = {
                id: 'SESS-' + Date.now(),
                name: document.getElementById('firstName').value,
                phone: document.getElementById('phone').value,
                minutes: parseInt(document.getElementById('packageMinutes').value),
                checkIn: Date.now(),
                status: 'Active'
            };

            sessions.push(newSession);
            localStorage.setItem('wii_sessions', JSON.stringify(sessions));
            this.reset();
            document.getElementById('regMsg').innerText = "Registration complete! Jump on in.";
            setTimeout(() => document.getElementById('regMsg').innerText = "", 4000);
            updateTable();
        });

        function updateTable() {
            const tbody = document.getElementById('sessionsTable');
            const sessions = JSON.parse(localStorage.getItem('wii_sessions')) || [];
            tbody.innerHTML = '';

            sessions.forEach(s => {
                let remainingStr = '00:00:00';
                let currentStatus = s.status;

                if (currentStatus !== 'Checked-Out') {
                    if (s.minutes === 9999) {
                        remainingStr = 'Unlimited';
                    } else {
                        const elapsed = Date.now() - s.checkIn;
                        const allowed = s.minutes * 60 * 1000;
                        const remainingMs = allowed - elapsed;

                        if (remainingMs <= 0) {
                            remainingStr = '00:00:00';
                            currentStatus = 'Timeout';
                        } else {
                            const secs = Math.floor((remainingMs / 1000) % 60).toString().padStart(2, '0');
                            const mins = Math.floor((remainingMs / (1000 * 60)) % 60).toString().padStart(2, '0');
                            const hours = Math.floor(remainingMs / (1000 * 60 * 60)).toString().padStart(2, '0');
                            remainingStr = `${hours}:${mins}:${secs}`;
                        }
                    }
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${s.name}</b></td>
                    <td>${s.minutes === 9999 ? 'Unlimited' : s.minutes + 'm'}</td>
                    <td style="font-family:monospace; font-size:15px; color:#06b6d4;">${remainingStr}</td>
                    <td><span class="status-${currentStatus.toLowerCase().replace('-','')}">${currentStatus}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        setInterval(updateTable, 1000);
        updateTable();
    </script>
</body>
</html>
