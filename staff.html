<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiiJump - Staff Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        nav { background-color: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3b82f6; }
        nav .logo { color: #22c55e; font-size: 1.6rem; font-weight: 800; text-decoration: none; }
        nav .logo span { color: #06b6d4; }
        nav a.back-link { color: #94a3b8; text-decoration: none; font-weight: 600; cursor: pointer; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        section { background: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; margin-bottom: 2rem; }
        h2 { color: white; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #1e293b; color: #06b6d4; }
        form { display: flex; flex-direction: column; gap: 12px; max-width: 320px; }
        label { font-size: 14px; color: #94a3b8; font-weight: 600; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; margin-top: 5px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: #3b82f6; }
        .btn-red { background: #ef4444; }
        .status-active { color: #22c55e; font-weight: bold; }
        .status-timeout { color: #ef4444; font-weight: bold; animation: flash 1s infinite alternate; }
        .status-checkedout { color: #64748b; }
        .error-msg { color: #ef4444; font-weight: bold; margin-top: 10px; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Wii<span>Jump</span> — Staff</a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a id="logoutLink" class="back-link" onclick="logout()" style="display:none; color: #ef4444;">Sign Out</a>
            <a href="index.html" class="back-link">← Main Menu</a>
        </div>
    </nav>

    <div class="container">
        <!-- Login Barrier Form -->
        <div id="loginSection">
            <section>
                <h2>Staff Gate Authentication</h2>
                <form id="loginForm">
                    <label>Username (Default: staff)<input type="text" id="username" required></label>
                    <label>Password (Default: staff123)<input type="password" id="password" required></label>
                    <button type="submit" class="btn btn-blue">Authorize Entry</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
            </section>
        </div>

        <!-- Main Dashboard Subsystem View -->
        <div id="dashboardSection" style="display: none;">
            <section>
                <h2>Active Court Management Queue</h2>
                <table>
                    <thead>
                        <tr><th>ID</th><th>Customer</th><th>Phone Line</th><th>Package</th><th>Remaining Time</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="staffTable"></tbody>
                </table>
            </section>

            <section style="max-width: 400px;">
                <h2>Change Session Password</h2>
                <form id="changePasswordForm">
                    <label>Current Password<input type="password" id="currPass" required></label>
                    <label>New Secret Password<input type="password" id="newPass" required></label>
                    <button type="submit" class="btn btn-blue">Update Security Credentials</button>
                    <div id="passMsg" style="font-weight: bold; margin-top: 5px;"></div>
                </form>
            </section>
        </div>
    </div>

    <script>
        // Ensure defaults are written into system registry storage arrays
        if (!localStorage.getItem('staff_pass')) localStorage.setItem('staff_pass', 'staff123');

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const correctPass = localStorage.getItem('staff_pass');

            if (user === 'staff' && pass === correctPass) {
                sessionStorage.setItem('staff_session', 'authenticated');
                checkSession();
            } else {
                document.getElementById('loginError').innerText = "Invalid Staff credentials provided.";
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const curr = document.getElementById('currPass').value;
            const nxt = document.getElementById('newPass').value;
            const stored = localStorage.getItem('staff_pass');

            const msgDiv = document.getElementById('passMsg');
            if (curr === stored) {
                localStorage.setItem('staff_pass', nxt);
                msgDiv.style.color = "#22c55e";
                msgDiv.innerText = "Password updated successfully!";
                this.reset();
            } else {
                msgDiv.style.color = "#ef4444";
                msgDiv.innerText = "Current password does not match registry.";
            }
        });

        function checkSession() {
            if (sessionStorage.getItem('staff_session') === 'authenticated') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                document.getElementById('logoutLink').style.display = 'block';
                updateStaffView();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
                document.getElementById('logoutLink').style.display = 'none';
            }
        }

        function logout() {
            sessionStorage.removeItem('staff_session');
            checkSession();
        }

        function updateStaffView() {
            if (sessionStorage.getItem('staff_session') !== 'authenticated') return;
            const tbody = document.getElementById('staffTable');
            const sessions = JSON.parse(localStorage.getItem('wii_sessions')) || [];
            tbody.innerHTML = '';

            sessions.forEach(s => {
                let remainingStr = '00:00:00';
                let currentStatus = s.status;

                if (currentStatus !== 'Checked-Out') {
                    if (s.minutes === 9999) {
                        remainingStr = 'Unlimited';
                    } else {
                        const elapsed = Date.now() - s.checkIn;
                        const allowed = s.minutes * 60 * 1000;
                        const remainingMs = allowed - elapsed;

                        if (remainingMs <= 0) {
                            remainingStr = '00:00:00';
                            currentStatus = 'Timeout';
                        } else {
                            const secs = Math.floor((remainingMs / 1000) % 60).toString().padStart(2, '0');
                            const mins = Math.floor((remainingMs / (1000 * 60)) % 60).toString().padStart(2, '0');
                            const hours = Math.floor(remainingMs / (1000 * 60 * 60)).toString().padStart(2, '0');
                            remainingStr = `${hours}:${mins}:${secs}`;
                        }
                    }
                }

                const actionCell = currentStatus !== 'Checked-Out' 
                    ? `<button class="btn btn-red" onclick="terminateSession('${s.id}')">Manual Check-Out</button>`
                    : `<span style="color:#475569">Archived</span>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family: monospace; color:#94a3b8;">${s.id}</td>
                    <td><b>${s.name}</b></td>
                    <td>${s.phone}</td>
                    <td>${s.minutes === 9999 ? 'Unlimited' : s.minutes + ' mins'}</td>
                    <td style="font-family:monospace; font-size:15px; color:#06b6d4;">${remainingStr}</td>
                    <td><span class="status-${currentStatus.toLowerCase().replace('-','')}">${currentStatus}</span></td>
                    <td>${actionCell}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function terminateSession(id) {
            const sessions = JSON.parse(localStorage.getItem('wii_sessions')) || [];
            const target = sessions.find(item => item.id === id);
            if (target) target.status = 'Checked-Out';
            localStorage.setItem('wii_sessions', JSON.stringify(sessions));
            updateStaffView();
        }

        setInterval(updateStaffView, 1000);
        checkSession();
    </script>
</body>
</html>
