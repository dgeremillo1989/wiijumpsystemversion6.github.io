<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>WiiJump - Staff Panel</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 0; 
        }
        
        nav { 
            background-color: #1e293b; 
            padding: 1rem 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #3b82f6; 
        }
        
        nav .logo { 
            color: #22c55e; 
            font-size: 1.6rem; 
            font-weight: 800; 
            text-decoration: none; 
        }
        
        nav .logo span { 
            color: #06b6d4; 
        }
        
        nav a.back-link { 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: color 0.2s;
        }
        
        nav a.back-link:hover { 
            color: #f8fafc; 
        }
        
        .container { 
            max-width: 1100px; 
            margin: 2rem auto; 
            padding: 0 1.5rem; 
        }
        
        section { 
            background: #1e293b; 
            padding: 2rem; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            margin-bottom: 2rem; 
        }
        
        h2 { 
            color: white; 
            margin-top: 0; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 10px; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 1rem; 
            background: #0f172a; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid #334155; 
            text-align: left; 
        }
        
        th { 
            background: #1e293b; 
            color: #06b6d4; 
            font-weight: 600;
        }
        
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-width: 320px; 
        }
        
        label { 
            font-size: 14px; 
            color: #94a3b8; 
            font-weight: 600; 
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        input { 
            background: #0f172a; 
            border: 1px solid #334155; 
            color: white; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
        
        input:invalid:not(:placeholder-shown) {
            border-color: #ef4444;
        }
        
        .btn { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white;
            transition: background-color 0.2s, opacity 0.2s;
            font-size: 14px;
        }
        
        .btn:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-blue { 
            background: #3b82f6; 
        }
        
        .btn-red { 
            background: #ef4444; 
        }
        
        .status-active { 
            color: #22c55e; 
            font-weight: bold; 
        }
        
        .status-timeout { 
            color: #ef4444; 
            font-weight: bold; 
            animation: flash 1s infinite alternate; 
        }
        
        .status-checkedout { 
            color: #64748b; 
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: 500;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error { 
            background: #7f1d1d;
            color: #fecaca;
            border: 1px solid #ef4444;
        }
        
        .alert-success {
            background: #1b4332;
            color: #dcfce7;
            border: 1px solid #22c55e;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes flash { 
            from { opacity: 1; } 
            to { opacity: 0.4; } 
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .no-data {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
            font-style: italic;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Wii<span>Jump</span> — Staff</a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a id="logoutLink" class="back-link" onclick="handleLogout()" style="display:none; color: #ef4444;" role="button" tabindex="0">Sign Out</a>
            <a href="index.html" class="back-link">← Main Menu</a>
        </div>
    </nav>

    <div class="container">
        <!-- Login Barrier Form -->
        <div id="loginSection">
            <section>
                <h2>Staff Gate Authentication</h2>
                <form id="loginForm">
                    <label for="username">Username
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            placeholder="Enter staff username"
                            required 
                            autocomplete="username"
                            minlength="3"
                            maxlength="50"
                        >
                    </label>
                    <label for="password">Password
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Enter password"
                            required 
                            autocomplete="current-password"
                            minlength="6"
                            maxlength="100"
                        >
                    </label>
                    <button type="submit" class="btn btn-blue" id="loginBtn">Authorize Entry</button>
                    <div id="loginError" class="alert alert-error" role="alert"></div>
                </form>
            </section>
        </div>

        <!-- Main Dashboard Subsystem View -->
        <div id="dashboardSection" style="display: none;">
            <section>
                <h2>Active Court Management Queue</h2>
                <div id="tableContainer">
                    <table role="table" aria-label="Active sessions">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Customer</th>
                                <th scope="col">Phone Line</th>
                                <th scope="col">Package</th>
                                <th scope="col">Remaining Time</th>
                                <th scope="col">Status</th>
                                <th scope="col">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTable"></tbody>
                    </table>
                </div>
                <div id="noDataMessage" class="no-data" style="display: none;">No active sessions</div>
                <div id="tableError" class="alert alert-error" role="alert"></div>
            </section>

            <section style="max-width: 400px;">
                <h2>Change Session Password</h2>
                <form id="changePasswordForm">
                    <label for="currPass">Current Password
                        <input 
                            type="password" 
                            id="currPass" 
                            name="currPass"
                            placeholder="Enter current password"
                            required 
                            autocomplete="current-password"
                            minlength="6"
                        >
                    </label>
                    <label for="newPass">New Secret Password
                        <input 
                            type="password" 
                            id="newPass" 
                            name="newPass"
                            placeholder="Enter new password"
                            required 
                            autocomplete="new-password"
                            minlength="6"
                        >
                    </label>
                    <button type="submit" class="btn btn-blue" id="passBtn">Update Security Credentials</button>
                    <div id="passMsg" class="alert" role="alert"></div>
                </form>
            </section>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            STORAGE_KEY_PASS: 'staff_pass',
            STORAGE_KEY_SESSIONS: 'wii_sessions',
            STORAGE_KEY_AUTH: 'staff_session',
            UPDATE_INTERVAL: 1000,
            DEFAULT_USERNAME: 'staff'
        };

        // Safe JSON parsing
        function safeJsonParse(jsonString, fallback = null) {
            try {
                return JSON.parse(jsonString);
            } catch (e) {
                console.error('JSON Parse Error:', e);
                return fallback;
            }
        }

        // Initialize default password on first load
        function initializeDefaults() {
            if (!localStorage.getItem(CONFIG.STORAGE_KEY_PASS)) {
                localStorage.setItem(CONFIG.STORAGE_KEY_PASS, 'staff123');
            }
        }

        // Show alert message
        function showAlert(elementId, message, type = 'error') {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.className = `alert ${type === 'error' ? 'alert-error' : 'alert-success'} show`;
                // Auto-hide success messages after 4 seconds
                if (type === 'success') {
                    setTimeout(() => {
                        element.classList.remove('show');
                    }, 4000);
                }
            }
        }

        // Clear alert
        function clearAlert(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                element.classList.remove('show');
                element.textContent = '';
            }
        }

        // Sanitize HTML to prevent XSS
        function sanitizeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearAlert('loginError');

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            // Basic validation
            if (!user || !pass) {
                showAlert('loginError', 'Username and password are required.');
                return;
            }

            // Disable button during submission
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Authenticating...';

            try {
                const correctPass = localStorage.getItem(CONFIG.STORAGE_KEY_PASS);

                if (user === CONFIG.DEFAULT_USERNAME && pass === correctPass) {
                    // Create a simple session token (not cryptographically secure, but better than plain text)
                    const sessionToken = btoa(`${Date.now()}-${Math.random()}`);
                    sessionStorage.setItem(CONFIG.STORAGE_KEY_AUTH, sessionToken);
                    checkSession();
                } else {
                    showAlert('loginError', 'Invalid username or password.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('loginError', 'An error occurred during authentication.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Authorize Entry';
            }
        });

        // Password change handler
        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearAlert('passMsg');

            const curr = document.getElementById('currPass').value;
            const nxt = document.getElementById('newPass').value;
            const passBtn = document.getElementById('passBtn');

            // Validation
            if (!curr || !nxt) {
                showAlert('passMsg', 'Both fields are required.', 'error');
                return;
            }

            if (curr === nxt) {
                showAlert('passMsg', 'New password must be different from current password.', 'error');
                return;
            }

            if (nxt.length < 6) {
                showAlert('passMsg', 'New password must be at least 6 characters.', 'error');
                return;
            }

            try {
                const stored = localStorage.getItem(CONFIG.STORAGE_KEY_PASS);

                if (curr === stored) {
                    localStorage.setItem(CONFIG.STORAGE_KEY_PASS, nxt);
                    showAlert('passMsg', 'Password updated successfully!', 'success');
                    this.reset();
                } else {
                    showAlert('passMsg', 'Current password does not match.', 'error');
                }
            } catch (error) {
                console.error('Password change error:', error);
                showAlert('passMsg', 'An error occurred while updating password.', 'error');
            }
        });

        // Check session and show appropriate section
        function checkSession() {
            const isAuthenticated = sessionStorage.getItem(CONFIG.STORAGE_KEY_AUTH);
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const logoutLink = document.getElementById('logoutLink');

            if (isAuthenticated) {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                logoutLink.style.display = 'block';
                updateStaffView();
            } else {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
                logoutLink.style.display = 'none';
            }
        }

        // Handle logout with confirmation
        function handleLogout() {
            if (confirm('Are you sure you want to sign out?')) {
                logout();
            }
        }

        // Logout handler
        function logout() {
            sessionStorage.removeItem(CONFIG.STORAGE_KEY_AUTH);
            checkSession();
            clearAlert('loginError');
            document.getElementById('loginForm').reset();
        }

        // Format time duration
        function formatTimeRemaining(milliseconds) {
            if (milliseconds <= 0) return '00:00:00';
            
            const totalSeconds = Math.floor(milliseconds / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // Update staff view
        function updateStaffView() {
            if (!sessionStorage.getItem(CONFIG.STORAGE_KEY_AUTH)) return;

            const tbody = document.getElementById('staffTable');
            const noDataMessage = document.getElementById('noDataMessage');
            const tableError = document.getElementById('tableError');

            try {
                clearAlert('tableError');
                const sessions = safeJsonParse(localStorage.getItem(CONFIG.STORAGE_KEY_SESSIONS), []);

                if (!Array.isArray(sessions)) {
                    throw new Error('Sessions data is not an array');
                }

                tbody.innerHTML = '';

                if (sessions.length === 0) {
                    noDataMessage.style.display = 'block';
                    return;
                }

                noDataMessage.style.display = 'none';

                sessions.forEach(s => {
                    try {
                        // Validate session data
                        if (!s || typeof s !== 'object') return;

                        let remainingStr = '00:00:00';
                        let currentStatus = s.status || 'Unknown';

                        // Calculate remaining time
                        if (currentStatus !== 'Checked-Out') {
                            if (s.minutes === 9999) {
                                remainingStr = 'Unlimited';
                            } else if (typeof s.checkIn === 'number' && typeof s.minutes === 'number') {
                                const elapsed = Date.now() - s.checkIn;
                                const allowed = s.minutes * 60 * 1000;
                                const remainingMs = allowed - elapsed;

                                if (remainingMs <= 0) {
                                    remainingStr = '00:00:00';
                                    currentStatus = 'Timeout';
                                } else {
                                    remainingStr = formatTimeRemaining(remainingMs);
                                }
                            }
                        }

                        // Create table row
                        const tr = document.createElement('tr');
                        const statusClass = `status-${currentStatus.toLowerCase().replace(/[-\s]/g, '')}`;
                        const sanitizedId = sanitizeHtml(s.id || 'N/A');
                        const sanitizedName = sanitizeHtml(s.name || 'N/A');
                        const sanitizedPhone = sanitizeHtml(s.phone || 'N/A');

                        let actionCell = '';
                        if (currentStatus !== 'Checked-Out') {
                            actionCell = `<button class="btn btn-red" onclick="confirmTerminate('${sanitizedId}')" aria-label="Manual check-out for session ${sanitizedId}">Manual Check-Out</button>`;
                        } else {
                            actionCell = `<span style="color:#475569">Archived</span>`;
                        }

                        tr.innerHTML = `
                            <td style="font-family: monospace; color:#94a3b8;">${sanitizedId}</td>
                            <td><b>${sanitizedName}</b></td>
                            <td>${sanitizedPhone}</td>
                            <td>${s.minutes === 9999 ? 'Unlimited' : sanitizeHtml((s.minutes || 0) + ' mins')}</td>
                            <td style="font-family:monospace; font-size:15px; color:#06b6d4;">${remainingStr}</td>
                            <td><span class="${statusClass}">${sanitizeHtml(currentStatus)}</span></td>
                            <td>${actionCell}</td>
                        `;
                        tbody.appendChild(tr);
                    } catch (rowError) {
                        console.error('Error processing session row:', rowError);
                    }
                });
            } catch (error) {
                console.error('Error updating staff view:', error);
                showAlert('tableError', 'Error loading session data. Please refresh the page.', 'error');
            }
        }

        // Confirm before terminating session
        function confirmTerminate(id) {
            if (confirm(`Terminate session ${id}?`)) {
                terminateSession(id);
            }
        }

        // Terminate session
        function terminateSession(id) {
            try {
                const sessions = safeJsonParse(localStorage.getItem(CONFIG.STORAGE_KEY_SESSIONS), []);
                const target = sessions.find(item => item && item.id === id);

                if (target) {
                    target.status = 'Checked-Out';
                    localStorage.setItem(CONFIG.STORAGE_KEY_SESSIONS, JSON.stringify(sessions));
                    updateStaffView();
                }
            } catch (error) {
                console.error('Error terminating session:', error);
                showAlert('tableError', 'Error terminating session.', 'error');
            }
        }

        // Initialize
        initializeDefaults();
        checkSession();

        // Update staff view periodically
        const updateInterval = setInterval(() => {
            if (sessionStorage.getItem(CONFIG.STORAGE_KEY_AUTH)) {
                updateStaffView();
            }
        }, CONFIG.UPDATE_INTERVAL);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            clearInterval(updateInterval);
        });

        // Handle logout on tab close (optional)
        window.addEventListener('unload', () => {
            sessionStorage.removeItem(CONFIG.STORAGE_KEY_AUTH);
        });
    </script>
</body>
</html>
